version: "3.9"

services:

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: energy_timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: energy_copilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d energy_copilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: energy_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP / REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333

volumes:
  timescale_data:
  qdrant_data:
