# Grafana server configuration for Energy Co-pilot
# Mounted at /etc/grafana/grafana.ini inside the container

[server]
root_url = %(protocol)s://%(domain)s/grafana
serve_from_sub_path = true

[security]
admin_user     = ${GF_SECURITY_ADMIN_USER}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
allow_embedding = true

[users]
allow_sign_up       = false
default_theme       = dark
home_page           = /d/plant-overview

[auth.anonymous]
enabled  = false

[dashboards]
default_home_dashboard_path = /grafana/dashboards/plant_overview.json

[analytics]
reporting_enabled    = false
check_for_updates    = false

[log]
mode  = console
level = warn

[database]
# Uses SQLite by default — fine for single-node demo.
# Swap for Postgres in production:
# type = postgres
# host = timescaledb:5432
# name = grafana
# user = postgres
# password = ${TIMESCALE_PASSWORD}

[plugins]
enable_alpha = false

[unified_alerting]
enabled = true

[smtp]
enabled = false
# enabled  = true
# host     = smtp.gmail.com:587
# user     = alerts@yourcompany.com
# password = yourapppassword
# from_address = alerts@yourcompany.com
# from_name    = Energy Co-pilot Alerts
