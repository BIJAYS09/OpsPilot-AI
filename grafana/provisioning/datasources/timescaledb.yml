apiVersion: 1

datasources:
  - name: TimescaleDB
    type: postgres
    uid: timescaledb-uid
    url: timescaledb:5432
    user: ${TIMESCALE_USER}
    secureJsonData:
      password: ${TIMESCALE_PASSWORD}
    jsonData:
      database: ${TIMESCALE_DB}
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: true
    isDefault: true
    editable: false
